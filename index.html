<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      <link rel="icon" href="./images/favicon.png" type="image/x-icon" />
      <title>What's For Dinner</title>

      <!-- icons -->
      <link rel="stylesheet" href="./css/all.min.css" />

      <!-- bootstrap -->
      <link rel="stylesheet" href="./css/bootstrap.min.css" />

      <!-- styles -->
      <link rel="stylesheet" href="./css/utilities.css" />
      <link rel="stylesheet" href="./css/style.css" />
   </head>

   <body class="linear-gradient-br-orange-50-yellow-50">
      <!-- S T A R T   H E A D E R -->
      <header class="bg-white border-bottom border-1 border-orange-100 shadow-sm">
         <nav class="navbar navbar-expand-lg bg-body-tertiary p-0">
            <div class="container-fluid max-width-80 mx-auto py-3 px-4">
               <div class="navbar-brand d-flex align-items-center gap-3 p-0">
                  <div class="w-48 h-48 d-flex align-items-center justify-content-center text-white fs-18 rounded-circle linear-gradient-br-orange-500-red-500">
                     <i class="fa-solid fa-utensils"></i>
                  </div>

                  <div>
                     <h1 class="mb-0 fs-18 fs-md-24 text-gray-900 fw-7">What's For Dinner</h1>
                     <p class="mb-0 fs-12 fs-md-14 text-gray-500">Your daily meal inspiration</p>
                  </div>
               </div>

               <button
                  class="navbar-toggler fs-24 text-gray-600 d-md-none"
                  type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#navbarSupportedContent"
                  aria-controls="navbarSupportedContent"
                  aria-expanded="false"
                  aria-label="Toggle navigation"
               >
                  <i class="fa-solid fa-bars"></i>
               </button>

               <div class="collapse navbar-collapse" id="navbarSupportedContent">
                  <div class="mt-3 py-3 m-md-0 p-md-0 border-top border-1 border-orange-100">
                     <ul class="navbar-nav flex-md-row align-items-md-center gap-md-4">
                        <li class="nav-item">
                           <button class="nav-link text-gray-600 p-0 mb-3 m-md-0 d-flex align-items-center gap-3 gap-md-0">
                              <span class="fs-18 fs-md-20"><i class="fa-solid fa-bookmark"></i></span>
                              <span class="d-md-none"> Saved Recipes </span>
                           </button>
                        </li>
                        <li class="nav-item">
                           <button class="nav-link text-gray-600 p-0 mb-3 m-md-0 d-flex align-items-center gap-3 gap-md-0">
                              <span class="fs-18 fs-md-20"><i class="fa-solid fa-clock-rotate-left"></i></span>
                              <span class="d-md-none"> Recent </span>
                           </button>
                        </li>
                        <li class="nav-item">
                           <button class="nav-link text-gray-600 p-0 mb-3 m-md-0 d-flex align-items-center gap-3 gap-md-0">
                              <span class="fs-18 fs-md-20"><i class="fa-solid fa-gear"></i></span>
                              <span class="d-md-none"> Settings </span>
                           </button>
                        </li>
                        <li class="nav-item">
                           <button class="nav-link text-gray-600 p-0 d-flex align-items-center gap-3">
                              <span class="w-32 h-32 w-md-40 h-md-40 rounded-circle border border-2 border-orange-300 overflow-hidden">
                                 <img class="w-32 h-32 w-md-40 h-md-40" src="./images/avatar-4.webp" alt="my Profile image" />
                              </span>
                              <span class="d-md-none"> Profile </span>
                           </button>
                        </li>
                     </ul>
                  </div>
               </div>
            </div>
         </nav>
      </header>
      <!-- E N D   H E A D E R -->

      <!-- S T A R T   M A I N   S E C T I O N -->
      <main class="p-4">
         <section>
            <div class="container-xxl p-0 px-xxl-5">
               <div id="dinner" class="bg-white rounded-5 shadow-xl mb-5">
                  <!-- dinner-photo -->
                  <div id="dinnerPhoto" class="dinner-photo position-relative h-400 overflow-hidden"></div>

                  <!-- dinner-info -->
                  <div class="dinner-info p-20">
                     <!-- dinner-name -->
                     <div id="dinnerName" class="dinner-name d-flex flex-column gap-4 mb-4 flex-md-row gap-md-0 align-items-md-center justify-content-md-between"></div>

                     <!-- extended-time -->
                     <div id="extendedTime"></div>

                     <!-- dinner-caption -->
                     <div id="dinnerCaption" class="dinner-caption">
                        <!-- buttons -->
                        <div class="nav nav-tabs flex-nowrap p-3 mb-4" id="nav-tab" role="tablist">
                           <button
                              class="btn fs-12 fs-md-16 fw-6 text-gray-500 p-0 pb-2 d-flex align-items-center justify-content-center gap-1 flex-grow-1 border-0 active"
                              id="nav-ingredients-tab"
                              data-bs-toggle="tab"
                              data-bs-target="#nav-ingredients"
                              type="button"
                              role="tab"
                              aria-controls="nav-ingredients"
                              aria-selected="true"
                           >
                              <span>
                                 <i class="fa-solid fa-list-check"></i>
                              </span>
                              Ingredients
                           </button>
                           <button
                              class="btn fs-12 fs-md-16 fw-6 text-gray-500 p-0 pb-2 d-flex align-items-center justify-content-center gap-1 flex-grow-1 border-0"
                              id="nav-instructions-tab"
                              data-bs-toggle="tab"
                              data-bs-target="#nav-instructions"
                              type="button"
                              role="tab"
                              aria-controls="nav-instructions"
                              aria-selected="false"
                           >
                              <span class="fs-16 fs-md-18 d-flex align-items-center justify-content-center">
                                 <svg
                                    class="svg-inline--fa fa-book-open"
                                    style="width: 1em; height: 0.8125em"
                                    aria-hidden="true"
                                    focusable="false"
                                    data-prefix="fas"
                                    data-icon="book-open"
                                    role="img"
                                    xmlns="http://www.w3.org/2000/svg"
                                    viewBox="0 0 576 512"
                                    data-fa-i2svg=""
                                 >
                                    <path
                                       fill="currentColor"
                                       d="M249.6 471.5c10.8 3.8 22.4-4.1 22.4-15.5V78.6c0-4.2-1.6-8.4-5-11C247.4 52 202.4 32 144 32C93.5 32 46.3 45.3 18.1 56.1C6.8 60.5 0 71.7 0 83.8V454.1c0 11.9 12.8 20.2 24.1 16.5C55.6 460.1 105.5 448 144 448c33.9 0 79 14 105.6 23.5zm76.8 0C353 462 398.1 448 432 448c38.5 0 88.4 12.1 119.9 22.6c11.3 3.8 24.1-4.6 24.1-16.5V83.8c0-12.1-6.8-23.3-18.1-27.6C529.7 45.3 482.5 32 432 32c-58.4 0-103.4 20-123 35.6c-3.3 2.6-5 6.8-5 11V456c0 11.4 11.7 19.3 22.4 15.5z"
                                    ></path>
                                 </svg>
                              </span>
                              Instructions
                           </button>
                           <button
                              class="btn fs-12 fs-md-16 fw-6 text-gray-500 p-0 pb-2 d-flex align-items-center justify-content-center gap-1 flex-grow-1 border-0"
                              id="nav-nutrition-tab"
                              data-bs-toggle="tab"
                              data-bs-target="#nav-nutrition"
                              type="button"
                              role="tab"
                              aria-controls="nav-nutrition"
                              aria-selected="false"
                           >
                              <span>
                                 <i class="fa-solid fa-chart-pie"></i>
                              </span>
                              Nutrition
                           </button>

                           <button
                              class="btn fs-12 fs-md-16 fw-6 text-gray-500 p-0 pb-2 d-flex align-items-center justify-content-center gap-1 flex-grow-1 border-0"
                              id="nav-tips-tab"
                              data-bs-toggle="tab"
                              data-bs-target="#nav-tips"
                              type="button"
                              role="tab"
                              aria-controls="nav-tips"
                              aria-selected="false"
                           >
                              <span>
                                 <i class="fa-solid fa-lightbulb"></i>
                              </span>
                              Chef's Tips
                           </button>
                        </div>

                        <!-- content -->
                        <div class="tab-content" id="nav-tabContent" style="height: 350px">
                           <!-- ingredients -->
                           <div class="tab-pane fade h-100 show active" id="nav-ingredients" role="tabpanel" aria-labelledby="nav-ingredients-tab" tabindex="0">
                              <div id="ingredients" class="rounded-top-4 d-flex flex-column gap-3 h-100 p-4 linear-gradient-br-orange-50-amber-50"></div>
                           </div>

                           <!-- instructions -->
                           <div class="tab-pane fade h-100" id="nav-instructions" role="tabpanel" aria-labelledby="nav-instructions-tab" tabindex="0">
                              <div id="instructions" class="h-100 d-flex flex-column gap-4"></div>
                           </div>

                           <!-- nutrition -->
                           <div class="tab-pane fade h-100" id="nav-nutrition" role="tabpanel" aria-labelledby="nav-nutrition-tab" tabindex="0">
                              <div class="h-100">
                                 <div class="container-fluid">
                                    <div id="nutrition" class="row g-3"></div>
                                 </div>
                              </div>
                           </div>

                           <!-- tips -->
                           <div class="tab-pane fade h-100" id="nav-tips" role="tabpanel" aria-labelledby="nav-tips-tab" tabindex="0">
                              <div id="tips" class="h-100 d-flex flex-column gap-3"></div>
                           </div>
                        </div>
                     </div>

                     <!-- button for Another Recipe -->
                     <div id="anotherRecipe" class="another-recipe pt-4 mt-32 d-flex border-top border-1 border-gray-200">
                        <button onclick="clickToNextMeal()" class="fs-14 fw-6 btn border-0 text-white d-flex align-items-center gap-2">
                           <span class="d-flex align-items-center justify-content-center">
                              <i class="fa-solid fa-arrows-rotate"></i>
                           </span>
                           <span>Try Another Recipe</span>
                        </button>
                     </div>
                  </div>
               </div>
            </div>
         </section>
      </main>
      <!-- E N D   M A I N   S E C T I O N -->

      <!-- java script -->
      <script src="./js/bootstrap.bundle.min.js"></script>
      <script src="./js/index.js"></script>
   </body>
</html>
